version: 1
persona: tsundere
model: gpt-5.3-codex
blocking: false

review:
  review_provider: codex-openai
  review_runner_label: ubuntu-24.04
  local_review_endpoint: ""
  local_review_model: ""
  max_findings: 8
  focus:
    - correctness
    - security
    - data-loss
    - tests

commands:
  fix: true
  require_author_association:
    - OWNER
    - MEMBER
    - COLLABORATOR

media:
  media_provider: higgsfield
  media_runner_label: ubuntu-24.04
  media_duration: 5
  allow_public_media_self_hosted: false
  artifact_html: true
  publish_media_branch: true
  storage_branch: senpai-media
  higgsfield_video: true
  higgsfield_image_endpoint: higgsfield-ai/soul/standard
  higgsfield_video_endpoint: higgsfield-ai/dop/standard
  higgsfield_fallback_image_endpoint: /v1/text2image/soul
  higgsfield_fallback_video_endpoint: /v1/image2video/dop
  higgsfield_duration: 5
  higgsfield_max_poll_ms: 480000
  higgsfield_image_resolution: 1080p
  higgsfield_image_quality: 1080p
  higgsfield_image_size: 1152x2048
  higgsfield_image_batch_size: 1
  higgsfield_video_model: dop-standard
  higgsfield_enhance_prompt: true
  higgsfield_aspect_ratio: 9:16
  higgsfield_private: false
  ltx_model_dir: /opt/models/ltx-2.3
  ltx_command: ""
  ltx_args_json: "[]"
  ltx_seconds: 5
  ltx_fps: 25
  ltx_width: 720
  ltx_height: 1280
