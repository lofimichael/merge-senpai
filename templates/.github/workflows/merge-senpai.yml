name: Merge Senpai

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
      reason:
        description: Why this review was dispatched
        required: false
        default: manual

permissions:
  contents: read

concurrency:
  group: merge-senpai-${{ inputs.pr_number || github.run_id }}
  cancel-in-progress: true

env:
  SENPAI_BRAND: Merge Senpai
  SENPAI_DEFAULT_MODEL: gpt-5.3-codex

jobs:
  resolve:
    name: resolve
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
      issues: write
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      base_ref: ${{ steps.resolve.outputs.base_ref }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_repo: ${{ steps.resolve.outputs.head_repo }}
      review_enabled: ${{ steps.resolve.outputs.review_enabled }}
      skip_reason: ${{ steps.resolve.outputs.skip_reason }}
      review_provider: ${{ steps.resolve.outputs.review_provider }}
      review_model: ${{ steps.resolve.outputs.review_model }}
      review_runs_on: ${{ steps.resolve.outputs.review_runs_on }}
      local_review_endpoint: ${{ steps.resolve.outputs.local_review_endpoint }}
      local_review_model: ${{ steps.resolve.outputs.local_review_model }}
      media_enabled: ${{ steps.resolve.outputs.media_enabled }}
      media_provider: ${{ steps.resolve.outputs.media_provider }}
      media_runs_on: ${{ steps.resolve.outputs.media_runs_on }}
      media_duration: ${{ steps.resolve.outputs.media_duration }}
      higgsfield_image_endpoint: ${{ steps.resolve.outputs.higgsfield_image_endpoint }}
      higgsfield_video_endpoint: ${{ steps.resolve.outputs.higgsfield_video_endpoint }}
      higgsfield_fallback_image_endpoint: ${{ steps.resolve.outputs.higgsfield_fallback_image_endpoint }}
      higgsfield_fallback_video_endpoint: ${{ steps.resolve.outputs.higgsfield_fallback_video_endpoint }}
      higgsfield_max_poll_ms: ${{ steps.resolve.outputs.higgsfield_max_poll_ms }}
      higgsfield_private: ${{ steps.resolve.outputs.higgsfield_private }}
      ltx_model_dir: ${{ steps.resolve.outputs.ltx_model_dir }}
      ltx_command: ${{ steps.resolve.outputs.ltx_command }}
      ltx_args_json: ${{ steps.resolve.outputs.ltx_args_json }}
      ltx_seconds: ${{ steps.resolve.outputs.ltx_seconds }}
      ltx_fps: ${{ steps.resolve.outputs.ltx_fps }}
      ltx_width: ${{ steps.resolve.outputs.ltx_width }}
      ltx_height: ${{ steps.resolve.outputs.ltx_height }}
      publish_media_branch: ${{ steps.resolve.outputs.publish_media_branch }}
      storage_branch: ${{ steps.resolve.outputs.storage_branch }}
      self_hosted_safety_verdict: ${{ steps.resolve.outputs.self_hosted_safety_verdict }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve pull request, config, and prompt
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          OPENAI_KEY_PRESENT: ${{ secrets.MERGE_SENPAI_OPENAI_KEY != '' }}
          LOCAL_REVIEW_ENDPOINT_SECRET_PRESENT: ${{ secrets.MERGE_SENPAI_LOCAL_REVIEW_ENDPOINT != '' }}
          LOCAL_REVIEW_ENDPOINT_VAR: ${{ vars.MERGE_SENPAI_LOCAL_REVIEW_ENDPOINT }}
          LOCAL_REVIEW_MODEL_VAR: ${{ vars.MERGE_SENPAI_LOCAL_REVIEW_MODEL }}
          REVIEW_RUNNER_VAR: ${{ vars.MERGE_SENPAI_REVIEW_RUNNER }}
          MEDIA_RUNNER_VAR: ${{ vars.MERGE_SENPAI_MEDIA_RUNNER }}
          ALLOW_PUBLIC_SELF_HOSTED_VAR: ${{ vars.MERGE_SENPAI_ALLOW_PUBLIC_SELF_HOSTED }}
          SENPAI_HIGGSFIELD_IMAGE_ENDPOINT_VAR: ${{ vars.SENPAI_HIGGSFIELD_IMAGE_ENDPOINT }}
          SENPAI_HIGGSFIELD_VIDEO_ENDPOINT_VAR: ${{ vars.SENPAI_HIGGSFIELD_VIDEO_ENDPOINT }}
          SENPAI_HIGGSFIELD_FALLBACK_IMAGE_ENDPOINT_VAR: ${{ vars.SENPAI_HIGGSFIELD_FALLBACK_IMAGE_ENDPOINT }}
          SENPAI_HIGGSFIELD_FALLBACK_VIDEO_ENDPOINT_VAR: ${{ vars.SENPAI_HIGGSFIELD_FALLBACK_VIDEO_ENDPOINT }}
          SENPAI_HIGGSFIELD_MAX_POLL_MS_VAR: ${{ vars.SENPAI_HIGGSFIELD_MAX_POLL_MS }}
          SENPAI_LTX_MODEL_DIR_VAR: ${{ vars.SENPAI_LTX_MODEL_DIR }}
          SENPAI_LTX_COMMAND_VAR: ${{ vars.SENPAI_LTX_COMMAND }}
          SENPAI_LTX_ARGS_JSON_VAR: ${{ vars.SENPAI_LTX_ARGS_JSON }}
          SENPAI_LTX_SECONDS_VAR: ${{ vars.SENPAI_LTX_SECONDS }}
          SENPAI_LTX_FPS_VAR: ${{ vars.SENPAI_LTX_FPS }}
          SENPAI_LTX_WIDTH_VAR: ${{ vars.SENPAI_LTX_WIDTH }}
          SENPAI_LTX_HEIGHT_VAR: ${{ vars.SENPAI_LTX_HEIGHT }}
        run: |
          set -euo pipefail
          PR_NUMBER="$PR_NUMBER_INPUT"
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" > "$RUNNER_TEMP/pr.json"
          BASE_REF="$(jq -r '.base.ref' "$RUNNER_TEMP/pr.json")"
          HEAD_REF="$(jq -r '.head.ref' "$RUNNER_TEMP/pr.json")"
          HEAD_SHA="$(jq -r '.head.sha' "$RUNNER_TEMP/pr.json")"
          HEAD_REPO="$(jq -r '.head.repo.full_name' "$RUNNER_TEMP/pr.json")"
          AUTHOR_ASSOCIATION="$(jq -r '.author_association // ""' "$RUNNER_TEMP/pr.json")"
          export PR_NUMBER BASE_REF HEAD_REF HEAD_SHA HEAD_REPO AUTHOR_ASSOCIATION

          git fetch origin "$BASE_REF" --depth=1 || true
          git show "origin/$BASE_REF:.github/senpai.yml" > "$RUNNER_TEMP/base-senpai.yml" 2>/dev/null || cp .github/senpai.yml "$RUNNER_TEMP/base-senpai.yml"

          git fetch origin "refs/pull/$PR_NUMBER/merge:refs/remotes/origin/senpai-pr-$PR_NUMBER-merge" || true
          git fetch origin "refs/pull/$PR_NUMBER/head:refs/remotes/origin/senpai-pr-$PR_NUMBER" || true
          git checkout --detach "refs/remotes/origin/senpai-pr-$PR_NUMBER-merge" || git checkout --detach "refs/remotes/origin/senpai-pr-$PR_NUMBER"

          git diff --unified=80 "origin/$BASE_REF"...HEAD > "$RUNNER_TEMP/pr.diff" 2>/dev/null || git diff --unified=80 HEAD~1...HEAD > "$RUNNER_TEMP/pr.diff" 2>/dev/null || true
          git diff --stat "origin/$BASE_REF"...HEAD > "$RUNNER_TEMP/pr.stat" 2>/dev/null || true

          cat > "$RUNNER_TEMP/senpai.schema.json" <<'JSON'
          {
            "type": "object",
            "additionalProperties": true,
            "required": ["verdict", "grade", "summary", "persona_line", "briefing_script", "image_prompt", "video_prompt", "findings"],
            "properties": {
              "verdict": { "type": "string", "enum": ["clean", "comment", "request_changes"] },
              "grade": { "type": "string" },
              "summary": { "type": "string" },
              "persona_line": { "type": "string" },
              "briefing_script": { "type": "string" },
              "image_prompt": { "type": "string" },
              "video_prompt": { "type": "string" },
              "media_plan": {
                "type": "object",
                "additionalProperties": true,
                "properties": {
                  "title": { "type": "string" },
                  "safe_summary": { "type": "string" },
                  "story_beats": { "type": "array" },
                  "negative_prompt": { "type": "string" },
                  "captions": { "type": "array", "items": { "type": "string" } }
                }
              },
              "findings": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "required": ["severity", "title", "file", "line", "message", "suggestion"],
                  "properties": {
                    "severity": { "type": "string", "enum": ["P0", "P1", "P2", "P3"] },
                    "title": { "type": "string" },
                    "file": { "type": "string" },
                    "line": { "type": "integer" },
                    "message": { "type": "string" },
                    "suggestion": { "type": "string" }
                  }
                }
              }
            }
          }
          JSON

          cat > "$RUNNER_TEMP/senpai.prompt.md" <<'PROMPT'
          You are Merge Senpai, a stern but caring CI reviewer.

          Review this pull request for correctness, security, data loss, broken tests, migration risk, and surprising behavior. Prefer high-signal findings over style nits.

          Output only JSON matching the provided schema. Persona is allowed only in persona_line, summary, briefing_script, media_plan, and optionally finding titles. Keep finding messages clinical and actionable.

          Write media_plan as provider-neutral story data. It must be safe for local or hosted media renderers: no source code, secrets, URLs, private identifiers, real person likenesses, or brand logos. Captions should be factual and short.

          Severity policy:
          - P0: security/data-loss/corruption or guaranteed production breakage.
          - P1: likely correctness bug, broken core workflow, missing critical test.
          - P2: important maintainability or edge-case issue.
          - P3: minor concern or polish.

          If there are no material issues, return verdict "clean" with an empty findings array.
          PROMPT

          {
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Pull request: #$PR_NUMBER"
            echo "Base ref: $BASE_REF"
            echo "Head ref: $HEAD_REF"
            echo "Head SHA: $HEAD_SHA"
            echo
            echo "Base-branch Merge Senpai config:"
            sed -n '1,260p' "$RUNNER_TEMP/base-senpai.yml"
            echo
            echo "Diff stat:"
            sed -n '1,160p' "$RUNNER_TEMP/pr.stat"
            echo
            echo "Unified diff, truncated if needed:"
            head -c 120000 "$RUNNER_TEMP/pr.diff"
          } >> "$RUNNER_TEMP/senpai.prompt.md"

          node <<'NODE'
          const fs = require("fs");

          const config = fs.readFileSync(`${process.env.RUNNER_TEMP}/base-senpai.yml`, "utf8");
          const out = process.env.GITHUB_OUTPUT;

          function output(name, value) {
            fs.appendFileSync(out, `${name}=${String(value ?? "").replace(/\n/g, " ")}\n`);
          }
          function configValue(name, fallback = "") {
            const pattern = new RegExp(`^\\s{0,2}${name}:\\s*(.*)$`);
            for (const line of config.split(/\n/)) {
              const match = line.match(pattern);
              if (!match) continue;
              let value = match[1].replace(/\s+#.*$/, "").trim();
              if (
                (value.startsWith('"') && value.endsWith('"')) ||
                (value.startsWith("'") && value.endsWith("'"))
              ) {
                value = value.slice(1, -1);
              }
              return value.trim();
            }
            return fallback;
          }
          function boolValue(value, fallback = false) {
            if (value == null || value === "") return fallback;
            return ["1", "true", "yes", "on"].includes(String(value).trim().toLowerCase());
          }
          function runsOnJson(value, fallback = "ubuntu-24.04") {
            const raw = String(value || fallback).trim();
            if (raw.startsWith("[") || raw.startsWith("{")) {
              JSON.parse(raw);
              return raw;
            }
            if (raw.includes(",")) {
              return JSON.stringify(raw.split(",").map((part) => part.trim()).filter(Boolean));
            }
            return JSON.stringify(raw);
          }
          function flattenRunsOn(value) {
            const parsed = JSON.parse(runsOnJson(value));
            return Array.isArray(parsed) ? parsed.map(String) : [String(parsed)];
          }
          function isSelfHosted(value) {
            const hosted = new Set([
              "ubuntu-latest",
              "ubuntu-24.04",
              "ubuntu-22.04",
              "windows-latest",
              "macos-latest",
              "macos-14",
              "macos-15",
            ]);
            const labels = flattenRunsOn(value).map((label) => label.toLowerCase());
            return labels.includes("self-hosted") || labels.some((label) => !hosted.has(label));
          }
          function localReviewProvider(value) {
            return ["local-vllm", "local-ollama", "local-llama-cpp"].includes(value);
          }
          function safetyVerdict(kind, runnerLabel) {
            const selfHosted = isSelfHosted(runnerLabel);
            if (!selfHosted) return { verdict: "allowed", selfHosted: false, reason: "hosted_runner" };

            const allowPublic = boolValue(configValue(`allow_public_${kind}_self_hosted`), false) ||
              boolValue(process.env.ALLOW_PUBLIC_SELF_HOSTED_VAR, false);
            if (process.env.HEAD_REPO !== process.env.GITHUB_REPOSITORY) {
              return { verdict: "denied", selfHosted: true, reason: "fork_pr" };
            }
            if (process.env.REPOSITORY_PRIVATE !== "true" && !allowPublic) {
              return { verdict: "denied", selfHosted: true, reason: "public_repo_self_hosted_denied" };
            }
            return { verdict: "allowed", selfHosted: true, reason: "explicit_self_hosted_allowed_state" };
          }

          const reviewProvider = configValue("review_provider", "codex-openai") || "codex-openai";
          const reviewModel = configValue("model", process.env.SENPAI_DEFAULT_MODEL || "gpt-5.3-codex");
          const localReviewEndpoint = process.env.LOCAL_REVIEW_ENDPOINT_VAR ||
            configValue("local_review_endpoint", "");
          const localReviewEndpointPresent = process.env.LOCAL_REVIEW_ENDPOINT_SECRET_PRESENT === "true" || Boolean(localReviewEndpoint);
          const localReviewModel = process.env.LOCAL_REVIEW_MODEL_VAR ||
            configValue("local_review_model", reviewModel);
          const reviewRunner = process.env.REVIEW_RUNNER_VAR ||
            configValue("review_runner_label", localReviewProvider(reviewProvider) ? "ubuntu-24.04" : "ubuntu-24.04");

          let mediaProvider = configValue("media_provider", "");
          const legacyHiggsfield = boolValue(configValue("higgsfield_video"), false);
          if (!mediaProvider) mediaProvider = legacyHiggsfield ? "higgsfield" : "off";
          if (mediaProvider === "ltx") mediaProvider = "ltx-local";
          const mediaRunner = process.env.MEDIA_RUNNER_VAR ||
            configValue("media_runner_label", mediaProvider === "ltx-local" ? '["self-hosted","gpu","ltx"]' : "ubuntu-24.04");

          const reviewSafety = safetyVerdict("review", reviewRunner);
          const mediaSafety = safetyVerdict("media", mediaRunner);
          const storageBranch = configValue("storage_branch", "senpai-media") || "senpai-media";
          const publishMediaBranch = boolValue(configValue("publish_media_branch"), true);
          const mediaDuration = configValue("media_duration", configValue("higgsfield_duration", "5")) || "5";
          const higgsfieldImageEndpoint = process.env.SENPAI_HIGGSFIELD_IMAGE_ENDPOINT_VAR ||
            configValue("higgsfield_image_endpoint", "higgsfield-ai/soul/standard");
          const higgsfieldVideoEndpoint = process.env.SENPAI_HIGGSFIELD_VIDEO_ENDPOINT_VAR ||
            configValue("higgsfield_video_endpoint", "higgsfield-ai/dop/standard");
          const higgsfieldFallbackImageEndpoint = process.env.SENPAI_HIGGSFIELD_FALLBACK_IMAGE_ENDPOINT_VAR ||
            configValue("higgsfield_fallback_image_endpoint", "/v1/text2image/soul");
          const higgsfieldFallbackVideoEndpoint = process.env.SENPAI_HIGGSFIELD_FALLBACK_VIDEO_ENDPOINT_VAR ||
            configValue("higgsfield_fallback_video_endpoint", "/v1/image2video/dop");
          const higgsfieldMaxPollMs = process.env.SENPAI_HIGGSFIELD_MAX_POLL_MS_VAR ||
            configValue("higgsfield_max_poll_ms", "480000");
          const higgsfieldPrivate = configValue("higgsfield_private", "false");
          const ltxModelDir = process.env.SENPAI_LTX_MODEL_DIR_VAR || configValue("ltx_model_dir", "/opt/models/ltx-2.3");
          const ltxCommand = process.env.SENPAI_LTX_COMMAND_VAR || configValue("ltx_command", "");
          const ltxArgsJson = process.env.SENPAI_LTX_ARGS_JSON_VAR || configValue("ltx_args_json", "[]");
          const ltxSeconds = process.env.SENPAI_LTX_SECONDS_VAR || configValue("ltx_seconds", mediaDuration);
          const ltxFps = process.env.SENPAI_LTX_FPS_VAR || configValue("ltx_fps", "25");
          const ltxWidth = process.env.SENPAI_LTX_WIDTH_VAR || configValue("ltx_width", "720");
          const ltxHeight = process.env.SENPAI_LTX_HEIGHT_VAR || configValue("ltx_height", "1280");

          let reviewEnabled = true;
          let skipReason = "";
          if (process.env.HEAD_REPO !== process.env.GITHUB_REPOSITORY) {
            reviewEnabled = false;
            skipReason = "Merge Senpai skipped this fork PR because the workflow is configured for same-repository PRs only.";
          } else if (reviewProvider === "codex-openai" && process.env.OPENAI_KEY_PRESENT !== "true") {
            reviewEnabled = false;
            skipReason = "Merge Senpai is installed, but MERGE_SENPAI_OPENAI_KEY is not configured yet.";
          } else if (localReviewProvider(reviewProvider) && !localReviewEndpointPresent) {
            reviewEnabled = false;
            skipReason = `Merge Senpai local review provider ${reviewProvider} requires MERGE_SENPAI_LOCAL_REVIEW_ENDPOINT.`;
          } else if (reviewSafety.verdict !== "allowed") {
            reviewEnabled = false;
            skipReason = `Merge Senpai skipped ${reviewProvider} because self-hosted review safety is ${reviewSafety.reason}.`;
          }

          let mediaEnabled = !["off", "none", "false", "static", ""].includes(mediaProvider);
          if (mediaProvider === "ltx-local" && mediaSafety.verdict !== "allowed") {
            mediaEnabled = false;
          }

          output("pr_number", process.env.PR_NUMBER);
          output("base_ref", process.env.BASE_REF);
          output("head_ref", process.env.HEAD_REF);
          output("head_sha", process.env.HEAD_SHA);
          output("head_repo", process.env.HEAD_REPO);
          output("review_enabled", reviewEnabled ? "true" : "false");
          output("skip_reason", skipReason);
          output("review_provider", reviewProvider);
          output("review_model", reviewModel);
          output("review_runs_on", runsOnJson(reviewRunner));
          output("local_review_endpoint", localReviewEndpoint);
          output("local_review_model", localReviewModel);
          output("media_enabled", mediaEnabled ? "true" : "false");
          output("media_provider", mediaProvider || "off");
          output("media_runs_on", runsOnJson(mediaRunner));
          output("media_duration", mediaDuration);
          output("higgsfield_image_endpoint", higgsfieldImageEndpoint);
          output("higgsfield_video_endpoint", higgsfieldVideoEndpoint);
          output("higgsfield_fallback_image_endpoint", higgsfieldFallbackImageEndpoint);
          output("higgsfield_fallback_video_endpoint", higgsfieldFallbackVideoEndpoint);
          output("higgsfield_max_poll_ms", higgsfieldMaxPollMs);
          output("higgsfield_private", higgsfieldPrivate);
          output("ltx_model_dir", ltxModelDir);
          output("ltx_command", ltxCommand);
          output("ltx_args_json", ltxArgsJson);
          output("ltx_seconds", ltxSeconds);
          output("ltx_fps", ltxFps);
          output("ltx_width", ltxWidth);
          output("ltx_height", ltxHeight);
          output("publish_media_branch", publishMediaBranch ? "true" : "false");
          output("storage_branch", storageBranch);
          output("self_hosted_safety_verdict", mediaSafety.verdict);
          output("self_hosted_safety_json", JSON.stringify({
            repository_private: process.env.REPOSITORY_PRIVATE === "true",
            head_repo_is_base_repo: process.env.HEAD_REPO === process.env.GITHUB_REPOSITORY,
            trusted_author_association: ["OWNER", "MEMBER", "COLLABORATOR"].includes(process.env.AUTHOR_ASSOCIATION || ""),
            review: reviewSafety,
            media: mediaSafety,
          }));
          NODE

      - name: Upload review input bundle
        uses: actions/upload-artifact@v4
        with:
          name: merge-senpai-input-pr-${{ steps.resolve.outputs.pr_number }}
          path: |
            ${{ runner.temp }}/base-senpai.yml
            ${{ runner.temp }}/senpai.schema.json
            ${{ runner.temp }}/senpai.prompt.md
            ${{ runner.temp }}/pr.stat
          if-no-files-found: error
          retention-days: 7

      - name: Comment when review is skipped
        if: steps.resolve.outputs.review_enabled != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          SKIP_REASON: ${{ steps.resolve.outputs.skip_reason }}
        run: |
          set -euo pipefail
          {
            echo "## Merge Senpai"
            echo
            echo "$SKIP_REASON"
          } > "$RUNNER_TEMP/senpai-skip.md"
          gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/senpai-skip.md" || true
          cat "$RUNNER_TEMP/senpai-skip.md" >> "$GITHUB_STEP_SUMMARY"

  review:
    name: review
    needs: resolve
    if: needs.resolve.outputs.review_enabled == 'true'
    runs-on: ${{ fromJSON(needs.resolve.outputs.review_runs_on) }}
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      review_posted: ${{ steps.review_output.outputs.review_posted }}
    steps:
      - name: Download review input bundle
        uses: actions/download-artifact@v4
        with:
          name: merge-senpai-input-pr-${{ needs.resolve.outputs.pr_number }}
          path: ${{ runner.temp }}/senpai-input

      - name: Checkout pull request merge for Codex
        if: needs.resolve.outputs.review_provider == 'codex-openai'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Select pull request merge for Codex
        if: needs.resolve.outputs.review_provider == 'codex-openai'
        env:
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          BASE_REF: ${{ needs.resolve.outputs.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1 || true
          git fetch origin "refs/pull/$PR_NUMBER/merge:refs/remotes/origin/senpai-pr-$PR_NUMBER-merge" || true
          git fetch origin "refs/pull/$PR_NUMBER/head:refs/remotes/origin/senpai-pr-$PR_NUMBER" || true
          git checkout --detach "refs/remotes/origin/senpai-pr-$PR_NUMBER-merge" || git checkout --detach "refs/remotes/origin/senpai-pr-$PR_NUMBER"

      - name: Checkout trusted Merge Senpai scripts for local review
        if: needs.resolve.outputs.review_provider != 'codex-openai'
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.base_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Run Codex review
        if: needs.resolve.outputs.review_provider == 'codex-openai'
        id: codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.MERGE_SENPAI_OPENAI_KEY }}
          model: ${{ needs.resolve.outputs.review_model }}
          prompt-file: ${{ runner.temp }}/senpai-input/senpai.prompt.md
          output-file: ${{ runner.temp }}/senpai-review.json
          sandbox: read-only
          codex-args: '["--ephemeral", "--output-schema", "${{ runner.temp }}/senpai-input/senpai.schema.json"]'
          allow-bots: true

      - name: Run local structured review
        if: needs.resolve.outputs.review_provider != 'codex-openai'
        id: local_review
        continue-on-error: true
        env:
          SENPAI_REVIEW_PROVIDER: ${{ needs.resolve.outputs.review_provider }}
          SENPAI_LOCAL_REVIEW_ENDPOINT: ${{ secrets.MERGE_SENPAI_LOCAL_REVIEW_ENDPOINT || needs.resolve.outputs.local_review_endpoint }}
          SENPAI_LOCAL_REVIEW_MODEL: ${{ needs.resolve.outputs.local_review_model }}
          SENPAI_LOCAL_REVIEW_API_KEY: ${{ secrets.MERGE_SENPAI_LOCAL_REVIEW_API_KEY }}
          SENPAI_PROMPT_FILE: ${{ runner.temp }}/senpai-input/senpai.prompt.md
          SENPAI_SCHEMA_FILE: ${{ runner.temp }}/senpai-input/senpai.schema.json
          SENPAI_REVIEW_OUTPUT: ${{ runner.temp }}/senpai-review.json
        run: node .github/merge-senpai/run-local-review.mjs

      - name: Normalize review JSON
        env:
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
          LOCAL_REVIEW_OUTCOME: ${{ steps.local_review.outcome }}
          REVIEW_PROVIDER: ${{ needs.resolve.outputs.review_provider }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = `${process.env.RUNNER_TEMP}/senpai-review.json`;
          const statPath = `${process.env.RUNNER_TEMP}/senpai-input/pr.stat`;
          let raw = fs.existsSync(path) ? fs.readFileSync(path, "utf8").trim() : "";
          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch {
            const match = raw.match(/\{[\s\S]*\}/);
            if (match) {
              try { parsed = JSON.parse(match[0]); } catch {}
            }
          }

          function readStatSummary() {
            if (!fs.existsSync(statPath)) return "";
            return fs.readFileSync(statPath, "utf8")
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean)
              .slice(0, 8)
              .join("; ");
          }
          function normalizeString(value, fallback = "") {
            return String(value ?? fallback).replace(/\r/g, "").trim();
          }

          if (!parsed || !Array.isArray(parsed.findings)) {
            const provider = process.env.REVIEW_PROVIDER || "unknown";
            const outcome = provider === "codex-openai"
              ? (process.env.CODEX_OUTCOME || "unavailable")
              : (process.env.LOCAL_REVIEW_OUTCOME || "unavailable");
            const statSummary = readStatSummary();
            parsed = {
              verdict: "comment",
              grade: "fallback",
              summary: [
                `The ${provider} review request was ${outcome}, so Merge Senpai generated a deterministic fallback card instead of blocking the workflow.`,
                statSummary ? `Diff summary: ${statSummary}.` : "",
                "No AI findings were produced by the fallback path."
              ].filter(Boolean).join(" "),
              persona_line: "The model stalled at the gate, so I kept the artifact trail moving.",
              briefing_script: "Merge Senpai preserved the review artifact and optional media flow while the review provider was unavailable.",
              image_prompt: "A premium CI review host presents a resilient fallback card, abstract diff panels, green workflow checks, no readable text.",
              video_prompt: "Animate a calm tech creator showing that the review card and media pipeline still completed after a review provider outage. Use abstract CI cards, checkmarks, and no readable text.",
              findings: [],
              fallback: true
            };
          }

          parsed.verdict = ["clean", "comment", "request_changes"].includes(parsed.verdict) ? parsed.verdict : "comment";
          parsed.grade = normalizeString(parsed.grade, "?");
          parsed.summary = normalizeString(parsed.summary, "No summary returned.");
          parsed.persona_line = normalizeString(parsed.persona_line, "I reviewed it because somebody had to.");
          parsed.briefing_script = normalizeString(parsed.briefing_script, parsed.summary);
          parsed.image_prompt = normalizeString(parsed.image_prompt, parsed.summary);
          parsed.video_prompt = normalizeString(parsed.video_prompt, parsed.briefing_script || parsed.summary);
          parsed.findings = Array.isArray(parsed.findings) ? parsed.findings.map((finding) => ({
            severity: ["P0", "P1", "P2", "P3"].includes(String(finding?.severity)) ? String(finding.severity) : "P3",
            title: normalizeString(finding?.title, "Untitled finding"),
            file: normalizeString(finding?.file),
            line: Number.isFinite(Number(finding?.line)) ? Number(finding.line) : 1,
            message: normalizeString(finding?.message),
            suggestion: normalizeString(finding?.suggestion),
          })) : [];
          parsed.media_plan ||= {
            title: "Pull request review briefing",
            safe_summary: parsed.summary,
            story_beats: [{
              duration_seconds: 5,
              visual: "Abstract CI review cards and pull request status panels.",
              motion: "Slow camera push with subtle interface motion.",
              audio: parsed.briefing_script,
            }],
            negative_prompt: "readable source code, secrets, URLs, brand logos, real people",
            captions: [`Verdict: ${parsed.verdict}`, `Findings: ${parsed.findings.length}`],
          };

          fs.writeFileSync(path, `${JSON.stringify(parsed, null, 2)}\n`);
          NODE

      - name: Post branded review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          BASE_REF: ${{ needs.resolve.outputs.base_ref }}
          HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          REVIEW_PROVIDER: ${{ needs.resolve.outputs.review_provider }}
        run: |
          set -euo pipefail
          cp "$RUNNER_TEMP/senpai-input/base-senpai.yml" "$RUNNER_TEMP/base-senpai.yml"
          node <<'NODE'
          const fs = require("fs");
          const review = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/senpai-review.json`, "utf8"));
          const findings = Array.isArray(review.findings) ? review.findings : [];
          const fallback = Boolean(review.fallback);
          const blockers = findings.filter(f => ["P0", "P1"].includes(String(f.severity))).length;
          const avatarUrl = `https://raw.githubusercontent.com/${process.env.GITHUB_REPOSITORY}/${process.env.BASE_REF}/.github/merge-senpai/avatar.png`;
          const marker = `<!-- merge-senpai:review:${process.env.PR_NUMBER}:${process.env.HEAD_SHA} -->`;

          function mdEscape(value) {
            return String(value ?? "").replace(/\r/g, "").trim();
          }
          function cmdEscape(value) {
            return String(value ?? "")
              .replace(/%/g, "%25")
              .replace(/\r/g, "%0D")
              .replace(/\n/g, "%0A");
          }
          function propEscape(value) {
            return cmdEscape(value).replace(/,/g, "%2C").replace(/:/g, "%3A");
          }
          function htmlEscape(value) {
            return String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;");
          }

          const verdict = mdEscape(review.verdict || "comment");
          const grade = mdEscape(review.grade || "?");
          const verdictLabels = {
            clean: "Clean",
            comment: "Review notes",
            request_changes: "Changes requested"
          };
          const verdictLabel = verdictLabels[verdict] || "Review";
          const reviewTitle = `${verdictLabel} (${grade})`;
          const provider = mdEscape(process.env.REVIEW_PROVIDER || "unknown");

          let body = `${marker}\n<img src="${avatarUrl}" width="72" align="right" alt="Merge Senpai" />\n\n`;
          body += `# Merge Senpai Review: ${reviewTitle}\n\n`;
          body += `**Grade:** ${grade}  \n`;
          body += `**Verdict:** \`${verdict}\`  \n`;
          body += `**Findings:** ${findings.length} total, ${blockers} blocking-class  \n`;
          body += `**Review provider:** \`${provider}\`\n\n`;
          body += `> ${mdEscape(review.persona_line || "I reviewed it because somebody had to.")}\n\n`;
          body += `${mdEscape(review.summary || "No summary returned.")}\n\n`;

          if (findings.length) {
            body += `## Findings\n\n`;
            for (const finding of findings) {
              const sev = mdEscape(finding.severity || "P3");
              const file = mdEscape(finding.file || "");
              const line = Number.isFinite(Number(finding.line)) ? Number(finding.line) : 1;
              body += `### ${sev}: ${mdEscape(finding.title || "Untitled finding")}\n\n`;
              body += `\`${file}:${line}\`\n\n`;
              body += `${mdEscape(finding.message || "")}\n\n`;
              if (finding.suggestion) {
                body += `**Suggestion:** ${mdEscape(finding.suggestion)}\n\n`;
              }

              const level = ["P0", "P1"].includes(sev) ? "warning" : "notice";
              const title = `${sev}: ${finding.title || "Merge Senpai finding"}`;
              const props = [`file=${propEscape(file)}`, `line=${line}`, `title=${propEscape(title)}`].join(",");
              console.log(`::${level} ${props}::${cmdEscape(finding.message || title)}`);
            }
          } else {
            body += fallback
              ? `No AI findings were produced by the fallback path. Re-run once provider capacity is available for a full AI review.\n\n`
              : `No material findings. Keep shipping carefully.\n\n`;
          }

          body += `---\n`;
          body += provider === "codex-openai"
            ? `Generated inside this repository by \`Merge Senpai\` using the repository's own \`MERGE_SENPAI_OPENAI_KEY\`.\n`
            : `Generated inside this repository by \`Merge Senpai\` using the configured local structured-output review provider.\n`;
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/senpai-review.md`, body);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body}\n`);

          const localAvatar = ".github/merge-senpai/avatar.png";
          const avatarData = fs.existsSync(localAvatar) ? fs.readFileSync(localAvatar).toString("base64") : "";
          const avatarSrc = avatarData ? `data:image/png;base64,${avatarData}` : avatarUrl;
          const rows = findings.map(f => `
            <article>
              <strong>${htmlEscape(f.severity || "P3")} - ${htmlEscape(f.title || "Untitled finding")}</strong>
              <code>${htmlEscape(f.file || "")}:${htmlEscape(f.line || "")}</code>
              <p>${htmlEscape(f.message || "")}</p>
            </article>
          `).join("");
          const html = `<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Merge Senpai Review PR #${htmlEscape(process.env.PR_NUMBER)}</title>
            <style>
              body{margin:0;background:#101012;color:#f7f2ea;font:16px/1.5 ui-sans-serif,system-ui;padding:32px}
              main{max-width:900px;margin:auto;border:1px solid #343238;border-radius:8px;background:#19191d;overflow:hidden}
              header{display:flex;gap:18px;align-items:center;padding:22px;border-bottom:1px solid #343238}
              img{width:72px;height:72px;border-radius:6px;background:#fff}
              h1{margin:0;font-size:28px} p{color:#c8c0b8} section{padding:22px}
              article{border-top:1px solid #343238;padding:16px 0} code{display:block;color:#f3c969;margin-top:4px}
            </style>
          </head>
          <body>
            <main>
              <header><img src="${avatarSrc}" alt=""><div><h1>Merge Senpai Review: ${htmlEscape(reviewTitle)}</h1><p>${htmlEscape(review.persona_line || "")}</p></div></header>
              <section><h2>${htmlEscape(verdictLabel)}</h2><p>${htmlEscape(review.summary || "")}</p>${rows || (fallback ? "<p>No AI findings were produced by the fallback path.</p>" : "<p>No material findings. Keep shipping carefully.</p>")}</section>
            </main>
          </body>
          </html>`;
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/senpai-report.html`, html);
          NODE

          gh pr review "$PR_NUMBER" --comment --body-file "$RUNNER_TEMP/senpai-review.md" \
            || gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/senpai-review.md" \
            || true

      - name: Upload review output bundle
        uses: actions/upload-artifact@v4
        with:
          name: merge-senpai-output-pr-${{ needs.resolve.outputs.pr_number }}
          path: |
            ${{ runner.temp }}/senpai-review.json
            ${{ runner.temp }}/senpai-review.md
            ${{ runner.temp }}/senpai-report.html
            ${{ runner.temp }}/base-senpai.yml
          if-no-files-found: error
          retention-days: 14

      - name: Mark review output
        id: review_output
        run: echo "review_posted=true" >> "$GITHUB_OUTPUT"

  media:
    name: media
    needs:
      - resolve
      - review
    if: needs.review.outputs.review_posted == 'true' && needs.resolve.outputs.media_enabled == 'true'
    runs-on: ${{ fromJSON(needs.resolve.outputs.media_runs_on) }}
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
    outputs:
      generated: ${{ steps.generate.outputs.generated }}
      provider: ${{ steps.generate.outputs.provider }}
      skip_reason: ${{ steps.generate.outputs.skip_reason }}
    steps:
      - name: Checkout trusted Merge Senpai scripts
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.base_ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Download review output bundle
        uses: actions/download-artifact@v4
        with:
          name: merge-senpai-output-pr-${{ needs.resolve.outputs.pr_number }}
          path: ${{ runner.temp }}/senpai-output

      - name: Generate provider media
        id: generate
        continue-on-error: true
        env:
          HIGGS_KEY_ID: ${{ secrets.HIGGS_KEY_ID }}
          HIGGS_API_SECRET: ${{ secrets.HIGGS_API_SECRET }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          SENPAI_REVIEW_JSON: ${{ runner.temp }}/senpai-output/senpai-review.json
          SENPAI_MEDIA_PROVIDER: ${{ needs.resolve.outputs.media_provider }}
          SENPAI_MEDIA_DURATION: ${{ needs.resolve.outputs.media_duration }}
          SENPAI_SELF_HOSTED_SAFETY_VERDICT: ${{ needs.resolve.outputs.self_hosted_safety_verdict }}
          SENPAI_HIGGSFIELD_IMAGE_ENDPOINT: ${{ needs.resolve.outputs.higgsfield_image_endpoint }}
          SENPAI_HIGGSFIELD_VIDEO_ENDPOINT: ${{ needs.resolve.outputs.higgsfield_video_endpoint }}
          SENPAI_HIGGSFIELD_FALLBACK_IMAGE_ENDPOINT: ${{ needs.resolve.outputs.higgsfield_fallback_image_endpoint }}
          SENPAI_HIGGSFIELD_FALLBACK_VIDEO_ENDPOINT: ${{ needs.resolve.outputs.higgsfield_fallback_video_endpoint }}
          SENPAI_HIGGSFIELD_MAX_POLL_MS: ${{ needs.resolve.outputs.higgsfield_max_poll_ms }}
          SENPAI_HIGGSFIELD_PRIVATE: ${{ needs.resolve.outputs.higgsfield_private }}
          SENPAI_LTX_MODEL_DIR: ${{ needs.resolve.outputs.ltx_model_dir }}
          SENPAI_LTX_COMMAND: ${{ needs.resolve.outputs.ltx_command }}
          SENPAI_LTX_ARGS_JSON: ${{ needs.resolve.outputs.ltx_args_json }}
          SENPAI_LTX_SECONDS: ${{ needs.resolve.outputs.ltx_seconds }}
          SENPAI_LTX_FPS: ${{ needs.resolve.outputs.ltx_fps }}
          SENPAI_LTX_WIDTH: ${{ needs.resolve.outputs.ltx_width }}
          SENPAI_LTX_HEIGHT: ${{ needs.resolve.outputs.ltx_height }}
        run: |
          set -euo pipefail
          if [ -n "${HIGGS_KEY_ID:-}" ]; then echo "::add-mask::$HIGGS_KEY_ID"; fi
          if [ -n "${HIGGS_API_SECRET:-}" ]; then echo "::add-mask::$HIGGS_API_SECRET"; fi
          node .github/merge-senpai/generate-media.mjs

      - name: Upload media output bundle
        if: steps.generate.outputs.generated == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: merge-senpai-media-pr-${{ needs.resolve.outputs.pr_number }}
          path: |
            ${{ runner.temp }}/senpai-briefing.mp4
            ${{ runner.temp }}/senpai-briefing-image.*
            ${{ runner.temp }}/senpai-media.json
            ${{ runner.temp }}/senpai-video.json
            ${{ runner.temp }}/senpai-ltx-request.json
          if-no-files-found: ignore
          retention-days: 14

  publish_media:
    name: publish media
    needs:
      - resolve
      - review
      - media
    if: always() && needs.review.outputs.review_posted == 'true' && needs.resolve.outputs.publish_media_branch == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.base_ref }}
          fetch-depth: 1

      - name: Download review output bundle
        uses: actions/download-artifact@v4
        with:
          name: merge-senpai-output-pr-${{ needs.resolve.outputs.pr_number }}
          path: ${{ runner.temp }}/senpai-output

      - name: Download optional media output bundle
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/senpai-media-output"
          gh run download "$GITHUB_RUN_ID" \
            --name "merge-senpai-media-pr-$PR_NUMBER" \
            --dir "$RUNNER_TEMP/senpai-media-output" || true

      - name: Publish report and optional media
        id: publish
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          STORAGE_BRANCH: ${{ needs.resolve.outputs.storage_branch }}
          MEDIA_PROVIDER: ${{ needs.resolve.outputs.media_provider }}
        run: |
          set -euo pipefail
          echo "published=false" >> "$GITHUB_OUTPUT"
          branch="${STORAGE_BRANCH:-senpai-media}"
          provider="$(printf '%s' "${MEDIA_PROVIDER:-static}" | tr -c 'A-Za-z0-9._-' '-')"
          tmp="$(mktemp -d)"
          git worktree add --detach "$tmp" HEAD
          (
            cd "$tmp"
            git config user.name "Merge Senpai"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              git fetch origin "$branch"
              git checkout "$branch"
            else
              git switch --orphan "$branch"
              git rm -rf . >/dev/null 2>&1 || true
            fi
            mkdir -p "pr-$PR_NUMBER"
            report_path="pr-$PR_NUMBER/$HEAD_SHA.html"
            cp "$RUNNER_TEMP/senpai-output/senpai-report.html" "$report_path"
            image_path=""
            image_source="$(find "$RUNNER_TEMP/senpai-media-output" -maxdepth 1 -type f -name 'senpai-briefing-image.*' | head -1 || true)"
            if [ -n "$image_source" ]; then
              image_ext="${image_source##*.}"
              image_path="pr-$PR_NUMBER/$HEAD_SHA-$provider-keyframe.$image_ext"
              cp "$image_source" "$image_path"
            fi
            video_path=""
            if [ -f "$RUNNER_TEMP/senpai-media-output/senpai-briefing.mp4" ]; then
              video_path="pr-$PR_NUMBER/$HEAD_SHA-$provider.mp4"
              cp "$RUNNER_TEMP/senpai-media-output/senpai-briefing.mp4" "$video_path"
            fi
            cp "$GITHUB_WORKSPACE/.github/merge-senpai/player.html" "player.html" 2>/dev/null || true
            cp "$GITHUB_WORKSPACE/.github/merge-senpai/avatar.png" "avatar.png" 2>/dev/null || true
            published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            REPORT_PATH="$report_path" IMAGE_PATH="$image_path" VIDEO_PATH="$video_path" PROVIDER="$provider" PUBLISHED_AT="$published_at" node <<'NODE'
            const fs = require("fs");
            const repo = process.env.GITHUB_REPOSITORY;
            const pr = process.env.PR_NUMBER;
            const sha = process.env.HEAD_SHA;
            const reportPath = process.env.REPORT_PATH;
            const imagePath = process.env.IMAGE_PATH || "";
            const videoPath = process.env.VIDEO_PATH || "";
            const provider = process.env.PROVIDER || "static";
            const publishedAt = process.env.PUBLISHED_AT;
            const readme = [
              "# Merge Senpai Media",
              "",
              "Static review-card storage for Merge Senpai.",
              "",
              `- Latest report: [PR #${pr} at ${sha}](${reportPath})`,
              ...(imagePath ? [
                `- Latest generated keyframe: [PR #${pr} ${provider} image](${imagePath})`,
              ] : []),
              ...(videoPath ? [
                `- Latest video briefing: [PR #${pr} ${provider} MP4](${videoPath})`,
                `- Player link: [player.html#v=./${videoPath}](player.html#v=./${videoPath})`,
              ] : []),
              `- Source PR: https://github.com/${repo}/pull/${pr}`,
              `- Published: ${publishedAt}`,
              "",
              "This branch is intentionally a tiny media shelf. CI writes static review cards",
              "and optional generated PR recap videos here so Merge Senpai can demo durable",
              "artifacts without running a database, bucket, or asset server.",
              "",
            ].join("\n");
            fs.writeFileSync("README.md", readme);

            const imagePanel = imagePath ? [
              '    <section class="panel">',
              "      <h2>Generated Keyframe</h2>",
              `      <p><a href="./${imagePath}">Open generated ${provider} image</a></p>`,
              "    </section>",
            ].join("\n") : "";
            const videoPanel = videoPath ? [
              '    <section class="panel">',
              "      <h2>Video Briefing</h2>",
              `      <p><a href="./${videoPath}">Open generated ${provider} MP4</a></p>`,
              `      <p><a href="./player.html#v=./${videoPath}">Open in the static player</a></p>`,
              "    </section>",
            ].join("\n") : "";
            const html = [
              "<!doctype html>",
              '<html lang="en">',
              "<head>",
              '  <meta charset="utf-8">',
              '  <meta name="viewport" content="width=device-width, initial-scale=1">',
              "  <title>Merge Senpai Media</title>",
              "  <style>",
              "    body{margin:0;background:#101012;color:#f7f2ea;font:16px/1.5 ui-sans-serif,system-ui;padding:32px}",
              "    main{max-width:880px;margin:auto}",
              "    img{width:64px;height:64px;border-radius:6px;background:#fff}",
              "    header{display:flex;gap:16px;align-items:center;margin-bottom:28px}",
              "    h1{margin:0;font-size:30px}",
              "    p{color:#c8c0b8}",
              "    a{color:#f3c969}",
              "    .panel{border:1px solid #343238;border-radius:8px;background:#19191d;padding:20px;margin:16px 0}",
              "    code{color:#ff9aa7}",
              "  </style>",
              "</head>",
              "<body>",
              "  <main>",
              "    <header>",
              '      <img src="./avatar.png" alt="Merge Senpai">',
              "      <div>",
              "        <h1>Merge Senpai Media</h1>",
              "        <p>Static review cards and optional videos stored on the <code>senpai-media</code> branch.</p>",
              "      </div>",
              "    </header>",
              '    <section class="panel">',
              "      <h2>Latest Review Card</h2>",
              `      <p><a href="./${reportPath}">Open PR #${pr} report for ${sha}</a></p>`,
              `      <p><a href="https://github.com/${repo}/pull/${pr}">Open the pull request</a></p>`,
              "    </section>",
              imagePanel,
              videoPanel,
              "  </main>",
              "</body>",
              "</html>",
              "",
            ].filter(Boolean).join("\n");
            fs.writeFileSync("index.html", html);
          NODE
            git add .
            git commit -m "Store Merge Senpai report for PR #$PR_NUMBER" || exit 0
            git push origin "HEAD:$branch"
          )
          git worktree remove "$tmp" --force
          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Post media comment
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          HEAD_SHA: ${{ needs.resolve.outputs.head_sha }}
          STORAGE_BRANCH: ${{ steps.publish.outputs.branch }}
          MEDIA_PROVIDER: ${{ needs.resolve.outputs.media_provider }}
        run: |
          set -euo pipefail
          branch="${STORAGE_BRANCH:-senpai-media}"
          provider="$(printf '%s' "${MEDIA_PROVIDER:-static}" | tr -c 'A-Za-z0-9._-' '-')"
          marker="<!-- merge-senpai:media:$PR_NUMBER:$HEAD_SHA -->"
          video_path=""
          if [ -f "$RUNNER_TEMP/senpai-media-output/senpai-briefing.mp4" ]; then
            video_path="pr-$PR_NUMBER/$HEAD_SHA-$provider.mp4"
          fi
          if [ -z "$video_path" ]; then
            exit 0
          fi
          image_path=""
          image_source="$(find "$RUNNER_TEMP/senpai-media-output" -maxdepth 1 -type f -name 'senpai-briefing-image.*' | head -1 || true)"
          if [ -n "$image_source" ]; then
            image_ext="${image_source##*.}"
            image_path="pr-$PR_NUMBER/$HEAD_SHA-$provider-keyframe.$image_ext"
          fi
          video_url="https://github.com/$GITHUB_REPOSITORY/blob/$branch/$video_path"
          player_url="https://github.com/$GITHUB_REPOSITORY/blob/$branch/player.html#v=./$video_path"

          {
            echo "$marker"
            echo "## Merge Senpai Video Briefing"
            echo
            echo "Merge Senpai generated a best-effort media recap with provider \`$provider\`."
            echo
            echo "- Video: [$video_path]($video_url)"
            echo "- Player: [open static player]($player_url)"
            if [ -n "$image_path" ]; then
              image_url="https://github.com/$GITHUB_REPOSITORY/blob/$branch/$image_path"
              echo "- Keyframe: [$image_path]($image_url)"
            fi
          } > "$RUNNER_TEMP/senpai-media-comment.md"

          comment_id="$(
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
              | tail -1
          )"
          if [ -n "$comment_id" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
              --method PATCH \
              --field body="$(cat "$RUNNER_TEMP/senpai-media-comment.md")" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/senpai-media-comment.md"
          fi
