name: Merge Senpai

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
      reason:
        description: Why this review was dispatched
        required: false
        default: manual

permissions:
  contents: read

concurrency:
  group: merge-senpai-${{ inputs.pr_number || github.run_id }}
  cancel-in-progress: true

env:
  SENPAI_BRAND: Merge Senpai
  SENPAI_DEFAULT_MODEL: gpt-5.3-codex
  SENPAI_MODEL: gpt-5.3-codex

jobs:
  review:
    name: review
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve pull request context
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ inputs.pr_number }}"
          gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" > "$RUNNER_TEMP/pr.json"
          BASE_REF="$(jq -r '.base.ref' "$RUNNER_TEMP/pr.json")"
          HEAD_REF="$(jq -r '.head.ref' "$RUNNER_TEMP/pr.json")"
          HEAD_SHA="$(jq -r '.head.sha' "$RUNNER_TEMP/pr.json")"
          HEAD_REPO="$(jq -r '.head.repo.full_name' "$RUNNER_TEMP/pr.json")"

          {
            echo "PR_NUMBER=$PR_NUMBER"
            echo "BASE_REF=$BASE_REF"
            echo "HEAD_REF=$HEAD_REF"
            echo "HEAD_SHA=$HEAD_SHA"
            echo "HEAD_REPO=$HEAD_REPO"
          } >> "$GITHUB_ENV"

      - name: Gate secret-backed review
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          enabled=true
          reason=""

          if [ "$HEAD_REPO" != "$GITHUB_REPOSITORY" ]; then
            enabled=false
            reason="Merge Senpai skipped this fork PR because GitHub does not pass repository secrets to fork-triggered workflows. Ask a maintainer to run a trusted same-repo review if needed."
          elif [ "${{ secrets.MERGE_SENPAI_OPENAI_KEY != '' }}" != "true" ]; then
            enabled=false
            reason="Merge Senpai is installed, but MERGE_SENPAI_OPENAI_KEY is not configured yet."
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

          if [ "$enabled" != "true" ]; then
            {
              echo "## Merge Senpai"
              echo
              echo "$reason"
            } > "$RUNNER_TEMP/senpai-skip.md"
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/senpai-skip.md" || true
            cat "$RUNNER_TEMP/senpai-skip.md" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout pull request merge
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --depth=1 || true
          git fetch origin "refs/pull/$PR_NUMBER/merge:refs/remotes/origin/senpai-pr-$PR_NUMBER-merge" || true
          git fetch origin "refs/pull/$PR_NUMBER/head:refs/remotes/origin/senpai-pr-$PR_NUMBER" || true
          git checkout --detach "refs/remotes/origin/senpai-pr-$PR_NUMBER-merge" || git checkout --detach "refs/remotes/origin/senpai-pr-$PR_NUMBER"

      - name: Prepare Codex review prompt
        if: steps.gate.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          git show "origin/$BASE_REF:.github/senpai.yml" > "$RUNNER_TEMP/base-senpai.yml" 2>/dev/null || cp .github/senpai.yml "$RUNNER_TEMP/base-senpai.yml"
          MODEL="$(sed -n -E 's/^model:[[:space:]]*"?([^"#]+)"?.*/\1/p' "$RUNNER_TEMP/base-senpai.yml" | head -1 | xargs || true)"
          echo "SENPAI_MODEL=${MODEL:-$SENPAI_DEFAULT_MODEL}" >> "$GITHUB_ENV"

          cat > "$RUNNER_TEMP/senpai.schema.json" <<'JSON'
          {
            "type": "object",
            "additionalProperties": false,
            "required": ["verdict", "grade", "summary", "persona_line", "briefing_script", "image_prompt", "video_prompt", "findings"],
            "properties": {
              "verdict": { "type": "string", "enum": ["clean", "comment", "request_changes"] },
              "grade": { "type": "string" },
              "summary": { "type": "string" },
              "persona_line": { "type": "string" },
              "briefing_script": { "type": "string" },
              "image_prompt": { "type": "string" },
              "video_prompt": { "type": "string" },
              "findings": {
                "type": "array",
                "items": {
                  "type": "object",
                  "additionalProperties": false,
                  "required": ["severity", "title", "file", "line", "message", "suggestion"],
                  "properties": {
                    "severity": { "type": "string", "enum": ["P0", "P1", "P2", "P3"] },
                    "title": { "type": "string" },
                    "file": { "type": "string" },
                    "line": { "type": "integer" },
                    "message": { "type": "string" },
                    "suggestion": { "type": "string" }
                  }
                }
              }
            }
          }
          JSON

          git diff --unified=80 "origin/$BASE_REF"...HEAD > "$RUNNER_TEMP/pr.diff" 2>/dev/null || git diff --unified=80 HEAD~1...HEAD > "$RUNNER_TEMP/pr.diff" 2>/dev/null || true
          git diff --stat "origin/$BASE_REF"...HEAD > "$RUNNER_TEMP/pr.stat" 2>/dev/null || true

          cat > "$RUNNER_TEMP/senpai.prompt.md" <<'PROMPT'
          You are Merge Senpai, a stern but caring CI reviewer.

          Review this pull request for correctness, security, data loss, broken tests, migration risk, and surprising behavior. Prefer high-signal findings over style nits.

          Output only JSON matching the provided schema. Persona is allowed only in persona_line, summary, briefing_script, and optionally finding titles. Keep finding messages clinical and actionable.

          Write video_prompt as a short image-to-video motion script for a social recap of the PR review: visual beats, captions, and scene direction. Do not include source code, secrets, URLs, private identifiers, real person likenesses, or brand logos.

          Severity policy:
          - P0: security/data-loss/corruption or guaranteed production breakage.
          - P1: likely correctness bug, broken core workflow, missing critical test.
          - P2: important maintainability or edge-case issue.
          - P3: minor concern or polish.

          If there are no material issues, return verdict "clean" with an empty findings array.
          PROMPT

          {
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Pull request: #$PR_NUMBER"
            echo "Base ref: $BASE_REF"
            echo "Head ref: $HEAD_REF"
            echo "Head SHA: $HEAD_SHA"
            echo
            echo "Base-branch Merge Senpai config:"
            sed -n '1,220p' "$RUNNER_TEMP/base-senpai.yml"
            echo
            echo "Diff stat:"
            sed -n '1,160p' "$RUNNER_TEMP/pr.stat"
            echo
            echo "Unified diff, truncated if needed:"
            head -c 120000 "$RUNNER_TEMP/pr.diff"
          } >> "$RUNNER_TEMP/senpai.prompt.md"

      - name: Run Codex review
        if: steps.gate.outputs.enabled == 'true'
        id: codex
        continue-on-error: true
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.MERGE_SENPAI_OPENAI_KEY }}
          model: ${{ env.SENPAI_MODEL }}
          prompt-file: ${{ runner.temp }}/senpai.prompt.md
          output-file: ${{ runner.temp }}/senpai-review.json
          sandbox: read-only
          codex-args: '["--ephemeral", "--output-schema", "${{ runner.temp }}/senpai.schema.json"]'
          allow-bots: true

      - name: Normalize review JSON
        if: steps.gate.outputs.enabled == 'true'
        env:
          CODEX_OUTCOME: ${{ steps.codex.outcome }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = `${process.env.RUNNER_TEMP}/senpai-review.json`;
          const statPath = `${process.env.RUNNER_TEMP}/pr.stat`;
          let raw = fs.existsSync(path) ? fs.readFileSync(path, "utf8").trim() : "";
          let parsed;
          try {
            parsed = JSON.parse(raw);
          } catch {
            const match = raw.match(/\{[\s\S]*\}/);
            if (match) {
              try { parsed = JSON.parse(match[0]); } catch {}
            }
          }

          function readStatSummary() {
            if (!fs.existsSync(statPath)) return "";
            return fs.readFileSync(statPath, "utf8")
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean)
              .slice(0, 8)
              .join("; ");
          }

          if (!parsed || !Array.isArray(parsed.findings)) {
            const outcome = process.env.CODEX_OUTCOME || "unavailable";
            const statSummary = readStatSummary();
            parsed = {
              verdict: "comment",
              grade: "fallback",
              summary: [
                `The AI review request was ${outcome}, so Merge Senpai generated a deterministic fallback card instead of blocking the workflow.`,
                statSummary ? `Diff summary: ${statSummary}.` : "",
                "No AI findings were produced by the fallback path."
              ].filter(Boolean).join(" "),
              persona_line: "The model stalled at the gate, so I kept the artifact trail moving.",
              briefing_script: "Merge Senpai preserved the review artifact and optional media flow while the AI review provider was unavailable.",
              image_prompt: "A premium CI review host presents a resilient fallback card, abstract diff panels, green workflow checks, no readable text.",
              video_prompt: "Animate a calm tech creator showing that the review card and media pipeline still completed after an AI review provider outage. Use abstract CI cards, checkmarks, and no readable text.",
              findings: [],
              fallback: true
            };
          }
          parsed.video_prompt ||= parsed.briefing_script || parsed.summary || "";
          fs.writeFileSync(path, `${JSON.stringify(parsed, null, 2)}\n`);
          NODE

      - name: Post branded review
        if: steps.gate.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const review = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/senpai-review.json`, "utf8"));
          const findings = Array.isArray(review.findings) ? review.findings : [];
          const fallback = Boolean(review.fallback);
          const blockers = findings.filter(f => ["P0", "P1"].includes(String(f.severity))).length;
          const avatarUrl = `https://raw.githubusercontent.com/${process.env.GITHUB_REPOSITORY}/${process.env.BASE_REF}/.github/merge-senpai/avatar.png`;
          const marker = `<!-- merge-senpai:review:${process.env.PR_NUMBER}:${process.env.HEAD_SHA} -->`;
          const baseConfig = fs.existsSync(`${process.env.RUNNER_TEMP}/base-senpai.yml`)
            ? fs.readFileSync(`${process.env.RUNNER_TEMP}/base-senpai.yml`, "utf8")
            : "";

          function mdEscape(value) {
            return String(value ?? "").replace(/\r/g, "").trim();
          }
          function cmdEscape(value) {
            return String(value ?? "")
              .replace(/%/g, "%25")
              .replace(/\r/g, "%0D")
              .replace(/\n/g, "%0A");
          }
          function propEscape(value) {
            return cmdEscape(value).replace(/,/g, "%2C").replace(/:/g, "%3A");
          }
          function htmlEscape(value) {
            return String(value ?? "")
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;");
          }
          function configValue(name, fallback = "") {
            const pattern = new RegExp(`(?:^|\\n)\\s{0,2}${name}:\\s*"?([^"\\n#]+)"?`);
            return (baseConfig.match(pattern)?.[1] || fallback).trim();
          }

          const verdict = mdEscape(review.verdict || "comment");
          const grade = mdEscape(review.grade || "?");
          const verdictLabels = {
            clean: "Clean",
            comment: "Review notes",
            request_changes: "Changes requested"
          };
          const verdictLabel = verdictLabels[verdict] || "Review";
          const reviewTitle = `${verdictLabel} (${grade})`;
          const storageBranch = configValue("storage_branch", "senpai-media");
          const imageFile = fs.readdirSync(process.env.RUNNER_TEMP).find(name => name.startsWith("senpai-briefing-image."));
          const hasVideo = fs.existsSync(`${process.env.RUNNER_TEMP}/senpai-briefing.mp4`);
          const hasImage = Boolean(imageFile);

          let body = `${marker}\n<img src="${avatarUrl}" width="72" align="right" alt="Merge Senpai" />\n\n`;
          body += `# Merge Senpai Review: ${reviewTitle}\n\n`;
          body += `**Grade:** ${grade}  \n`;
          body += `**Verdict:** \`${verdict}\`  \n`;
          body += `**Findings:** ${findings.length} total, ${blockers} blocking-class\n\n`;
          body += `> ${mdEscape(review.persona_line || "I reviewed it because somebody had to.")}\n\n`;
          body += `${mdEscape(review.summary || "No summary returned.")}\n\n`;
          if (hasImage || hasVideo) {
            body += `**Optional Higgsfield media:** generated locally. Merge Senpai will add a separate media comment if publishing to \`${storageBranch}\` succeeds.\n\n`;
          }

          if (findings.length) {
            body += `## Findings\n\n`;
            for (const finding of findings) {
              const sev = mdEscape(finding.severity || "P3");
              const file = mdEscape(finding.file || "");
              const line = Number.isFinite(Number(finding.line)) ? Number(finding.line) : 1;
              body += `### ${sev}: ${mdEscape(finding.title || "Untitled finding")}\n\n`;
              body += `\`${file}:${line}\`\n\n`;
              body += `${mdEscape(finding.message || "")}\n\n`;
              if (finding.suggestion) {
                body += `**Suggestion:** ${mdEscape(finding.suggestion)}\n\n`;
              }

              const level = ["P0", "P1"].includes(sev) ? "warning" : "notice";
              const title = `${sev}: ${finding.title || "Merge Senpai finding"}`;
              const props = [`file=${propEscape(file)}`, `line=${line}`, `title=${propEscape(title)}`].join(",");
              console.log(`::${level} ${props}::${cmdEscape(finding.message || title)}`);
            }
          } else {
            body += fallback
              ? `No AI findings were produced by the fallback path. Re-run once provider quota is available for a full AI review.\n\n`
              : `No material findings. Keep shipping carefully.\n\n`;
          }

          body += `---\n`;
          body += `Generated inside this repository by \`Merge Senpai\` using the repository's own \`MERGE_SENPAI_OPENAI_KEY\`.\n`;
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/senpai-review.md`, body);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${body}\n`);

          const localAvatar = ".github/merge-senpai/avatar.png";
          const avatarData = fs.existsSync(localAvatar) ? fs.readFileSync(localAvatar).toString("base64") : "";
          const avatarSrc = avatarData ? `data:image/png;base64,${avatarData}` : avatarUrl;
          const rows = findings.map(f => `
            <article>
              <strong>${htmlEscape(f.severity || "P3")} - ${htmlEscape(f.title || "Untitled finding")}</strong>
              <code>${htmlEscape(f.file || "")}:${htmlEscape(f.line || "")}</code>
              <p>${htmlEscape(f.message || "")}</p>
            </article>
          `).join("");
          const mediaSection = (hasImage || hasVideo) ? `
              <section>
                <h2>Optional Media</h2>
                <p>Higgsfield media generated locally. A separate PR comment links the committed assets if publishing to ${htmlEscape(storageBranch)} succeeds.</p>
              </section>` : "";
          const html = `<!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Merge Senpai Review PR #${htmlEscape(process.env.PR_NUMBER)}</title>
            <style>
              body{margin:0;background:#101012;color:#f7f2ea;font:16px/1.5 ui-sans-serif,system-ui;padding:32px}
              main{max-width:900px;margin:auto;border:1px solid #343238;border-radius:8px;background:#19191d;overflow:hidden}
              header{display:flex;gap:18px;align-items:center;padding:22px;border-bottom:1px solid #343238}
              img{width:72px;height:72px;border-radius:6px;background:#fff}
              h1{margin:0;font-size:28px} p{color:#c8c0b8} section{padding:22px}
              article{border-top:1px solid #343238;padding:16px 0} code{display:block;color:#f3c969;margin-top:4px}
            </style>
          </head>
          <body>
            <main>
              <header><img src="${avatarSrc}" alt=""><div><h1>Merge Senpai Review: ${htmlEscape(reviewTitle)}</h1><p>${htmlEscape(review.persona_line || "")}</p></div></header>
              <section><h2>${htmlEscape(verdictLabel)}</h2><p>${htmlEscape(review.summary || "")}</p>${rows || (fallback ? "<p>No AI findings were produced by the fallback path.</p>" : "<p>No material findings. Keep shipping carefully.</p>")}</section>
              ${mediaSection}
            </main>
          </body>
          </html>`;
          fs.writeFileSync(`${process.env.RUNNER_TEMP}/senpai-report.html`, html);
          NODE

          gh pr review "$PR_NUMBER" --comment --body-file "$RUNNER_TEMP/senpai-review.md" \
            || gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/senpai-review.md" \
            || true

      - name: Upload branded review card
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: merge-senpai-pr-${{ env.PR_NUMBER }}
          path: ${{ runner.temp }}/senpai-report.html
          if-no-files-found: error
          retention-days: 14

      - name: Generate Higgsfield media briefing
        if: steps.gate.outputs.enabled == 'true'
        id: higgsfield
        continue-on-error: true
        timeout-minutes: 10
        env:
          HIGGS_KEY_ID: ${{ secrets.HIGGS_KEY_ID }}
          HIGGS_API_SECRET: ${{ secrets.HIGGS_API_SECRET }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
        run: |
          set -euo pipefail
          config_value() {
            sed -n -E "s/^  $1:[[:space:]]*\"?([^\"#]+)\"?.*/\1/p; s/^$1:[[:space:]]*\"?([^\"#]+)\"?.*/\1/p" "$RUNNER_TEMP/base-senpai.yml" | head -1 | xargs || true
          }
          bool_value() {
            printf '%s' "$1" | tr '[:upper:]' '[:lower:]'
          }
          set_higgsfield_env() {
            local name="$1"
            local config_key="$2"
            local value
            value="$(config_value "$config_key")"
            export "$name=$value"
          }

          enabled="$(bool_value "$(config_value higgsfield_video)")"
          if [ "$enabled" != "true" ]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          private_allowed="$(bool_value "$(config_value higgsfield_private)")"
          if [ "$REPOSITORY_PRIVATE" = "true" ] && [ "$private_allowed" != "true" ]; then
            echo "::warning::Higgsfield video skipped for private repository because media.higgsfield_private is not true."
            echo "generated=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${HIGGS_KEY_ID:-}" ]; then echo "::add-mask::$HIGGS_KEY_ID"; fi
          if [ -n "${HIGGS_API_SECRET:-}" ]; then echo "::add-mask::$HIGGS_API_SECRET"; fi
          if [ ! -f .github/merge-senpai/generate-higgsfield-video.mjs ]; then
            mkdir -p .github/merge-senpai
            if ! git show "origin/$BASE_REF:.github/merge-senpai/generate-higgsfield-video.mjs" > .github/merge-senpai/generate-higgsfield-video.mjs 2>/dev/null; then
              echo "::warning::Higgsfield media skipped because the helper is missing from the checked-out PR tree and base branch."
              echo "generated=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          set_higgsfield_env SENPAI_HIGGSFIELD_IMAGE_ENDPOINT higgsfield_image_endpoint
          set_higgsfield_env SENPAI_HIGGSFIELD_VIDEO_ENDPOINT higgsfield_video_endpoint
          set_higgsfield_env SENPAI_HIGGSFIELD_FALLBACK_IMAGE_ENDPOINT higgsfield_fallback_image_endpoint
          set_higgsfield_env SENPAI_HIGGSFIELD_FALLBACK_VIDEO_ENDPOINT higgsfield_fallback_video_endpoint
          set_higgsfield_env SENPAI_HIGGSFIELD_DURATION higgsfield_duration
          set_higgsfield_env SENPAI_HIGGSFIELD_IMAGE_RESOLUTION higgsfield_image_resolution
          set_higgsfield_env SENPAI_HIGGSFIELD_IMAGE_QUALITY higgsfield_image_quality
          set_higgsfield_env SENPAI_HIGGSFIELD_IMAGE_SIZE higgsfield_image_size
          set_higgsfield_env SENPAI_HIGGSFIELD_IMAGE_BATCH_SIZE higgsfield_image_batch_size
          set_higgsfield_env SENPAI_HIGGSFIELD_VIDEO_MODEL higgsfield_video_model
          set_higgsfield_env SENPAI_HIGGSFIELD_ENHANCE_PROMPT higgsfield_enhance_prompt
          set_higgsfield_env SENPAI_HIGGSFIELD_ASPECT_RATIO higgsfield_aspect_ratio
          set_higgsfield_env SENPAI_HIGGSFIELD_MAX_POLL_MS higgsfield_max_poll_ms
          if ! node .github/merge-senpai/generate-higgsfield-video.mjs; then
            echo "::warning::Higgsfield media generation failed; continuing with the review card only."
            echo "generated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Higgsfield media briefing
        if: steps.gate.outputs.enabled == 'true' && steps.higgsfield.outputs.generated == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: merge-senpai-media-pr-${{ env.PR_NUMBER }}
          path: |
            ${{ runner.temp }}/senpai-briefing.mp4
            ${{ runner.temp }}/senpai-briefing-image.*
          if-no-files-found: error
          retention-days: 14

      - name: Publish to senpai-media branch
        id: publish_media
        if: steps.gate.outputs.enabled == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "published=false" >> "$GITHUB_OUTPUT"
          if ! grep -Eq '^  publish_media_branch:[[:space:]]*true|^publish_media_branch:[[:space:]]*true' "$RUNNER_TEMP/base-senpai.yml"; then
            exit 0
          fi
          branch="$(sed -n -E 's/^  storage_branch:[[:space:]]*"?([^"#]+)"?.*/\1/p; s/^storage_branch:[[:space:]]*"?([^"#]+)"?.*/\1/p' "$RUNNER_TEMP/base-senpai.yml" | head -1 | xargs || true)"
          branch="${branch:-senpai-media}"
          tmp="$(mktemp -d)"
          git worktree add --detach "$tmp" HEAD
          (
            cd "$tmp"
            git config user.name "Merge Senpai"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
              git fetch origin "$branch"
              git checkout "$branch"
            else
              git switch --orphan "$branch"
              git rm -rf . >/dev/null 2>&1 || true
            fi
            mkdir -p "pr-$PR_NUMBER"
            report_path="pr-$PR_NUMBER/$HEAD_SHA.html"
            cp "$RUNNER_TEMP/senpai-report.html" "$report_path"
            image_path=""
            image_source="$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name 'senpai-briefing-image.*' | head -1 || true)"
            if [ -n "$image_source" ]; then
              image_ext="${image_source##*.}"
              image_path="pr-$PR_NUMBER/$HEAD_SHA-higgsfield-keyframe.$image_ext"
              cp "$image_source" "$image_path"
            fi
            video_path=""
            if [ -f "$RUNNER_TEMP/senpai-briefing.mp4" ]; then
              video_path="pr-$PR_NUMBER/$HEAD_SHA-higgsfield.mp4"
              cp "$RUNNER_TEMP/senpai-briefing.mp4" "$video_path"
            fi
            cp "$GITHUB_WORKSPACE/.github/merge-senpai/player.html" "player.html" 2>/dev/null || true
            cp "$GITHUB_WORKSPACE/.github/merge-senpai/avatar.png" "avatar.png" 2>/dev/null || true
            published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            REPORT_PATH="$report_path" IMAGE_PATH="$image_path" VIDEO_PATH="$video_path" PUBLISHED_AT="$published_at" node <<'NODE'
            const fs = require("fs");
            const repo = process.env.GITHUB_REPOSITORY;
            const pr = process.env.PR_NUMBER;
            const sha = process.env.HEAD_SHA;
            const reportPath = process.env.REPORT_PATH;
            const imagePath = process.env.IMAGE_PATH || "";
            const videoPath = process.env.VIDEO_PATH || "";
            const publishedAt = process.env.PUBLISHED_AT;
            const readme = [
              "# Merge Senpai Media",
              "",
              "Static review-card storage for Merge Senpai.",
              "",
              `- Latest report: [PR #${pr} at ${sha}](${reportPath})`,
              ...(imagePath ? [
                `- Latest generated keyframe: [PR #${pr} Higgsfield image](${imagePath})`,
              ] : []),
              ...(videoPath ? [
                `- Latest video briefing: [PR #${pr} Higgsfield MP4](${videoPath})`,
                `- Player link: [player.html#v=./${videoPath}](player.html#v=./${videoPath})`,
              ] : []),
              `- Source PR: https://github.com/${repo}/pull/${pr}`,
              `- Published: ${publishedAt}`,
              "",
              "This branch is intentionally a tiny media shelf. CI writes static review cards",
              "and optional generated PR recap videos here so Merge Senpai can demo durable",
              "artifacts without running a database, bucket, or asset server.",
              "",
              "Presentation note: this is a GitHub-flavored nod to the Infinite Storage Glitch",
              "idea of using an unexpected host as storage:",
              "https://github.com/KKarmugil/Infinite_Storage_Glitch",
              "",
            ].join("\n");
            fs.writeFileSync("README.md", readme);

            const imagePanel = imagePath ? [
              '    <section class="panel">',
              "      <h2>Generated Keyframe</h2>",
              `      <p><a href="./${imagePath}">Open generated Higgsfield image</a></p>`,
              "    </section>",
            ].join("\n") : "";
            const videoPanel = videoPath ? [
              '    <section class="panel">',
              "      <h2>Video Briefing</h2>",
              `      <p><a href="./${videoPath}">Open generated Higgsfield MP4</a></p>`,
              `      <p><a href="./player.html#v=./${videoPath}">Open in the static player</a></p>`,
              "    </section>",
            ].join("\n") : "";
            const html = [
              "<!doctype html>",
              '<html lang="en">',
              "<head>",
              '  <meta charset="utf-8">',
              '  <meta name="viewport" content="width=device-width, initial-scale=1">',
              "  <title>Merge Senpai Media</title>",
              "  <style>",
              "    body{margin:0;background:#101012;color:#f7f2ea;font:16px/1.5 ui-sans-serif,system-ui;padding:32px}",
              "    main{max-width:880px;margin:auto}",
              "    img{width:64px;height:64px;border-radius:6px;background:#fff}",
              "    header{display:flex;gap:16px;align-items:center;margin-bottom:28px}",
              "    h1{margin:0;font-size:30px}",
              "    p{color:#c8c0b8}",
              "    a{color:#f3c969}",
              "    .panel{border:1px solid #343238;border-radius:8px;background:#19191d;padding:20px;margin:16px 0}",
              "    code{color:#ff9aa7}",
              "  </style>",
              "</head>",
              "<body>",
              "  <main>",
              "    <header>",
              '      <img src="./avatar.png" alt="Merge Senpai">',
              "      <div>",
              "        <h1>Merge Senpai Media</h1>",
              "        <p>Static review cards and optional videos stored on the <code>senpai-media</code> branch.</p>",
              "      </div>",
              "    </header>",
              '    <section class="panel">',
              "      <h2>Latest Review Card</h2>",
              `      <p><a href="./${reportPath}">Open PR #${pr} report for ${sha}</a></p>`,
              `      <p><a href="https://github.com/${repo}/pull/${pr}">Open the pull request</a></p>`,
              "    </section>",
              imagePanel,
              videoPanel,
              '    <section class="panel">',
              "      <h2>Presentation Hook</h2>",
              "      <p>Inspired by the playful Infinite Storage Glitch idea: if video can be storage, a Git branch can be a tiny review-card shelf.</p>",
              '      <p><a href="https://github.com/KKarmugil/Infinite_Storage_Glitch">Infinite Storage Glitch reference</a></p>',
              "    </section>",
              "  </main>",
              "</body>",
              "</html>",
              "",
            ].filter(Boolean).join("\n");
            fs.writeFileSync("index.html", html);
          NODE
            git add .
            git commit -m "Store Merge Senpai report for PR #$PR_NUMBER" || exit 0
            git push origin "HEAD:$branch"
          )
          git worktree remove "$tmp" --force
          echo "published=true" >> "$GITHUB_OUTPUT"

      - name: Post Higgsfield media comment
        if: steps.gate.outputs.enabled == 'true' && steps.higgsfield.outputs.generated == 'true' && steps.publish_media.outputs.published == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="$(sed -n -E 's/^  storage_branch:[[:space:]]*"?([^"#]+)"?.*/\1/p; s/^storage_branch:[[:space:]]*"?([^"#]+)"?.*/\1/p' "$RUNNER_TEMP/base-senpai.yml" | head -1 | xargs || true)"
          branch="${branch:-senpai-media}"
          marker="<!-- merge-senpai:media:$PR_NUMBER:$HEAD_SHA -->"
          video_path="pr-$PR_NUMBER/$HEAD_SHA-higgsfield.mp4"
          image_path=""
          image_source="$(find "$RUNNER_TEMP" -maxdepth 1 -type f -name 'senpai-briefing-image.*' | head -1 || true)"
          if [ -n "$image_source" ]; then
            image_ext="${image_source##*.}"
            image_path="pr-$PR_NUMBER/$HEAD_SHA-higgsfield-keyframe.$image_ext"
          fi
          video_url="https://github.com/$GITHUB_REPOSITORY/blob/$branch/$video_path"
          player_url="https://github.com/$GITHUB_REPOSITORY/blob/$branch/player.html#v=./$video_path"

          {
            echo "$marker"
            echo "## Merge Senpai Video Briefing"
            echo
            echo "Higgsfield generated a best-effort media recap for this review."
            echo
            echo "- Video: [$video_path]($video_url)"
            echo "- Player: [open static player]($player_url)"
            if [ -n "$image_path" ]; then
              image_url="https://github.com/$GITHUB_REPOSITORY/blob/$branch/$image_path"
              echo "- Keyframe: [$image_path]($image_url)"
            fi
          } > "$RUNNER_TEMP/senpai-media-comment.md"

          comment_id="$(
            gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" \
              | tail -1
          )"
          if [ -n "$comment_id" ]; then
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$comment_id" \
              --method PATCH \
              --field body="$(cat "$RUNNER_TEMP/senpai-media-comment.md")" >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$RUNNER_TEMP/senpai-media-comment.md"
          fi
