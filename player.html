<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Merge Senpai Briefing</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101012;
      --panel: #19191d;
      --ink: #f7f2ea;
      --muted: #b8b1a8;
      --line: #343238;
      --red: #ff5b6e;
      --gold: #f3c969;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(255,91,110,.14), transparent 34%),
        radial-gradient(circle at 80% 12%, rgba(243,201,105,.12), transparent 28%),
        var(--bg);
      color: var(--ink);
      font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(980px, calc(100vw - 32px));
      border: 1px solid var(--line);
      background: color-mix(in srgb, var(--panel) 94%, transparent);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.36);
    }
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
    }
    img {
      width: 56px;
      height: 56px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #fff;
    }
    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }
    p {
      margin: 2px 0 0;
      color: var(--muted);
    }
    .stage {
      padding: 20px;
    }
    video {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: block;
      background: #050506;
      border: 1px solid var(--line);
      border-radius: 6px;
    }
    .empty {
      min-height: 240px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: 6px;
      color: var(--muted);
      text-align: center;
      padding: 24px;
    }
    code {
      color: var(--gold);
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img src="./avatar.png" alt="Merge Senpai">
      <div>
        <h1>Merge Senpai Briefing</h1>
        <p>Drop an MP4 URL in <code>#v=...</code> to play a PR status briefing.</p>
      </div>
    </header>
    <section class="stage" id="stage"></section>
  </main>
  <script>
    const params = new URLSearchParams(location.hash.slice(1));
    const videoUrl = params.get("v");
    const stage = document.getElementById("stage");
    if (videoUrl) {
      const video = document.createElement("video");
      video.controls = true;
      video.playsInline = true;
      video.src = videoUrl;
      stage.append(video);
    } else {
      stage.innerHTML = '<div class="empty">No briefing URL yet.<br>Use <code>player.html#v=https://example.com/senpai.mp4</code>.</div>';
    }
  </script>
</body>
</html>
